<!DOCTYPE html>
<html>
  <head>
    <title>UniTasks</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <h1>UniTasks</h1>
      <div class="input-area">
        <input type="text" id="TI" placeholder="Enter a task">
        <input type="number" id="reminderHours" placeholder="Hours" min="0">
        <input type="number" id="reminderMins" placeholder="Minutes" min="0" max="59">
        <button onclick="addTask()">Add Task</button>
        <button onclick="try { new Notification('Test!'); alert('Notification sent!'); } catch(e) { alert('Error: ' + e.message); }">Test Reminder</button>
      </div>
      <ul id="taskList"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
